{% extends "base.html" %}

{% block title %}管理记忆 - AI Memory Gateway{% endblock %}

{% block content %}
<h2>🧠 记忆管理</h2>
<div class="nav">
    <a href="/import/memories">→ 导入新记忆</a> ｜ 
    <a href="/export/memories">→ 导出备份</a>
</div>

<div class="toolbar">
    <input type="text" id="searchBox" class="search-box" placeholder="搜索记忆..." oninput="filterAndSort()">
    <input type="date" id="dateFilter" onchange="filterAndSort()" title="按日期筛选">
    <button class="btn-gray" onclick="clearDateFilter()" style="padding:7px 10px;font-size:12px;" title="清除日期">✕</button>
    <select id="sortSelect" onchange="filterAndSort()">
        <option value="id-desc">ID 从新到旧</option>
        <option value="id-asc">ID 从旧到新</option>
        <option value="imp-desc">权重 从高到低</option>
        <option value="imp-asc">权重 从低到高</option>
    </select>
    <button class="btn-green" onclick="batchSave()">批量保存全部</button>
    <button class="btn-red" onclick="batchDelete()">批量删除选中</button>
    <label style="font-size:13px;color:#666;cursor:pointer;">
        <input type="checkbox" id="selectAll" onchange="toggleAll()"> 全选
    </label>
</div>

<div id="msg"></div>
<div class="stats" id="stats"></div>

<div class="table-wrapper">
    <table>
        <thead>
            <tr>
                <th class="check-col"><input type="checkbox" id="selectAllHead" onchange="toggleAll()"></th>
                <th class="id-col">ID</th>
                <th>内容</th>
                <th class="imp-col">权重</th>
                <th class="source-col">来源</th>
                <th class="time-col">时间</th>
                <th class="actions-col">操作</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/manage.js"></script>
{% endblock %}
